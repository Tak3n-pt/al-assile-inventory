name: Build Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "dist-electron" -Filter "*.exe" |
            Where-Object { $_.Name -notmatch "uninstall" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No Windows installer .exe found in dist-electron."
          }

          New-Item -ItemType Directory -Path "release" -Force | Out-Null
          Copy-Item -LiteralPath $installer.FullName -Destination "release/Al-Assile-Inventory-Setup.exe" -Force

          "path=release/Al-Assile-Inventory-Setup.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish latest installer release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (node -p "require('./package.json').version").Trim()
          $tag = "windows-v$version-build-${{ github.run_number }}"
          $title = "Al Assile Inventory $version build ${{ github.run_number }}"
          $notes = "Windows installer built from commit $env:GITHUB_SHA.`n`nDownload Al-Assile-Inventory-Setup.exe from the release assets."

          gh release create $tag "${{ steps.asset.outputs.path }}" --target "$env:GITHUB_SHA" --title "$title" --notes "$notes"
